<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>信用卡優惠查詢</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6f9;
      --card-bg: #ffffff;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 1px 4px rgba(0,0,0,.08);
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }
    header h1 { font-size: 1.15rem; font-weight: 700; flex: 1; }
    .data-date { font-size: .78rem; color: var(--text-muted); }

    .tabs {
      display: flex;
      background: #fff;
      border-bottom: 2px solid var(--border);
      padding: 0 16px;
    }
    .tab-btn {
      padding: 11px 18px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: .93rem;
      color: var(--text-muted);
      font-weight: 500;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }

    main { max-width: 860px; margin: 0 auto; padding: 20px 14px; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Search */
    .search-box { display: flex; gap: 8px; margin-bottom: 16px; }
    .search-box input {
      flex: 1;
      padding: 11px 14px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      font-size: 1rem;
      outline: none;
    }
    .search-box input:focus { border-color: var(--primary); }

    .btn {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 600;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }

    .match-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .83rem;
      color: var(--text-muted);
      margin-bottom: 14px;
    }
    .match-badge {
      background: #eff6ff;
      color: var(--primary);
      padding: 2px 10px;
      border-radius: 999px;
      font-weight: 600;
      font-size: .78rem;
    }

    /* Quick tags */
    .quick-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
    .quick-tag {
      padding: 5px 12px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: #fff;
      cursor: pointer;
      font-size: .82rem;
      color: var(--text-muted);
      transition: all .15s;
    }
    .quick-tag:hover { border-color: var(--primary); color: var(--primary); background: #eff6ff; }

    /* Result cards */
    .result-list { display: flex; flex-direction: column; gap: 10px; }
    .result-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px 16px;
      border-left: 5px solid #ccc;
      display: grid;
      grid-template-columns: 44px 1fr auto;
      gap: 10px;
      align-items: center;
    }
    .rank-badge {
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; flex-shrink: 0;
    }
    .rank-1 .rank-badge { background: #fef3c7; }
    .rank-2 .rank-badge { background: #f1f5f9; }
    .rank-3 .rank-badge { background: #fef9ee; }
    .rank-other .rank-badge { background: #f8fafc; font-size: .9rem; font-weight: 700; color: var(--text-muted); }

    .card-info { overflow: hidden; }
    .card-name { font-weight: 700; font-size: .97rem; }
    .card-issuer { font-size: .78rem; color: var(--text-muted); }
    .card-note { font-size: .8rem; color: #475569; margin-top: 3px; }
    .card-cond { font-size: .76rem; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .rate-block { text-align: right; }
    .rate-value { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
    .rate-cap { font-size: .73rem; color: #f59e0b; }
    .rate-link { font-size: .7rem; color: #94a3b8; text-decoration: none; }
    .rate-link:hover { text-decoration: underline; }

    /* Accordion */
    .accordion { display: flex; flex-direction: column; gap: 10px; }
    .acc-item { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .acc-header {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 16px; cursor: pointer;
      border-left: 5px solid #ccc;
    }
    .acc-header:hover { background: #f8fafc; }
    .acc-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
    .acc-title { font-weight: 700; flex: 1; }
    .acc-sub { font-size: .78rem; color: var(--text-muted); }
    .acc-chevron { color: var(--text-muted); font-size: .85rem; transition: transform .2s; }
    .acc-item.open .acc-chevron { transform: rotate(180deg); }

    .acc-body { display: none; padding: 0 16px 14px; }
    .acc-item.open .acc-body { display: block; }
    .acc-notes { font-size: .82rem; color: #475569; margin-bottom: 10px; }
    .acc-fee { font-size: .78rem; color: var(--text-muted); margin-bottom: 8px; }

    .rates-table { width: 100%; border-collapse: collapse; font-size: .84rem; }
    .rates-table th {
      text-align: left; padding: 5px 8px;
      background: #f8fafc; color: var(--text-muted);
      font-size: .76rem; border-bottom: 1px solid var(--border);
    }
    .rates-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .rates-table tr:last-child td { border-bottom: none; }
    .rate-num { font-weight: 700; color: var(--primary); }

    .acc-src { font-size: .73rem; color: var(--text-muted); margin-top: 8px; }
    .acc-src a { color: var(--primary); }

    .placeholder { text-align: center; color: var(--text-muted); padding: 44px 0; }
    .placeholder .icon { font-size: 2.2rem; margin-bottom: 8px; }

    @media (max-width: 520px) {
      .result-card { grid-template-columns: 36px 1fr auto; gap: 8px; padding: 11px 12px; }
      .rate-value { font-size: 1.25rem; }
      header h1 { font-size: 1rem; }
    }
  </style>
</head>

<header>
  <h1>💳 信用卡優惠查詢</h1>
  <span class="data-date">資料更新：2026-05-01</span>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('search')">商家查詢</button>
  <button class="tab-btn" onclick="switchTab('all')">查看所有優惠</button>
</div>

<main>
  <div class="tab-panel active" id="panel-search">
    <div class="search-box">
      <input type="text" id="storeInput" placeholder="輸入商家名稱，例如：全聯、蝦皮、日本…"
             onkeydown="if(event.key==='Enter')doSearch()" />
      <button class="btn btn-primary" onclick="doSearch()">查詢</button>
    </div>

    <div class="quick-tags">
      <span style="font-size:.8rem;color:var(--text-muted);align-self:center">常見：</span>
      <button class="quick-tag" onclick="quickSearch('全聯')">全聯</button>
      <button class="quick-tag" onclick="quickSearch('蝦皮')">蝦皮</button>
      <button class="quick-tag" onclick="quickSearch('7-11')">7-11</button>
      <button class="quick-tag" onclick="quickSearch('麥當勞')">麥當勞</button>
      <button class="quick-tag" onclick="quickSearch('Uber')">Uber 叫車</button>
      <button class="quick-tag" onclick="quickSearch('屈臣氏')">屈臣氏</button>
      <button class="quick-tag" onclick="quickSearch('UNIQLO')">UNIQLO</button>
      <button class="quick-tag" onclick="quickSearch('威秀')">電影院</button>
      <button class="quick-tag" onclick="quickSearch('日本')">日本</button>
      <button class="quick-tag" onclick="quickSearch('海外')">海外</button>
      <button class="quick-tag" onclick="quickSearch('加油站')">加油站</button>
      <button class="quick-tag" onclick="quickSearch('LINE Pay')">LINE Pay</button>
    </div>

    <div id="matchLabel" class="match-label" style="display:none"></div>
    <div id="results" class="result-list">
      <div class="placeholder">
        <div class="icon">🔍</div>
        輸入商家名稱，找出最划算的信用卡
      </div>
    </div>
  </div>

  <div class="tab-panel" id="panel-all">
    <div id="accordion" class="accordion"></div>
  </div>
</main>

function normalize(s) { return s.toLowerCase().replace(/[\s\-_\.,、。，]/g,''); }

function detectCategory(input) {
  const norm = normalize(input);
  let best = { category:'general', score:0, keyword:null };
  for (const [kw, cat] of Object.entries(MERCHANT_MAP)) {
    const nk = normalize(kw);
    let score = 0;
    if (norm === nk) score = 100;
    else if (norm.includes(nk)) score = 80;
    else if (nk.includes(norm)) score = 60;
    else {
      const common = [...nk].filter(c => norm.includes(c)).length;
      score = nk.length > 0 ? Math.floor(common/nk.length*35) : 0;
    }
    if (score > best.score) best = { category:cat, score, keyword:kw };
  }
  if (best.score < 30) return { category:'general', score:0, keyword:null };
  return best;
}

function queryStore(storeName) {
  const { category, score, keyword } = detectCategory(storeName);
  const rateKeyMap = CATEGORY_RATE_KEY[category] || CATEGORY_RATE_KEY['general'];
  const ranked = CARDS.map(card => {
    const rk = rateKeyMap[card.id] || 'general';
    const r = card.rates[rk] || card.rates['general'] || { rate:0, unit:'%', cap:null, capUnit:null, note:'' };
    return { ...card, rateKey:rk, rate:r.rate||0, unit:r.unit||'%', cap:r.cap, capUnit:r.capUnit, note:r.note||'', cardNotes:card.notes };
  });
  ranked.sort((a,b) => b.rate!==a.rate ? b.rate-a.rate : a.id.localeCompare(b.id));
  return { category, categoryLabel: CATEGORY_LABELS[category]||category, score, keyword, ranked };
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['search','all'][i]===tab));
  document.getElementById('panel-search').classList.toggle('active', tab==='search');
  document.getElementById('panel-all').classList.toggle('active', tab==='all');
  if (tab==='all' && !document.getElementById('accordion').children.length) renderAccordion();
}

function quickSearch(kw) {
  document.getElementById('storeInput').value = kw;
  doSearch();
}

function doSearch() {
  const store = document.getElementById('storeInput').value.trim();
  if (!store) return;
  const { category, categoryLabel, keyword, ranked } = queryStore(store);

  const matchEl = document.getElementById('matchLabel');
  matchEl.style.display = 'flex';
  matchEl.innerHTML = `<span>偵測消費類別：</span><span class="match-badge">${categoryLabel}</span>${keyword?`<span style="font-size:.78rem">（關鍵字：${keyword}）</span>`:''}`;

  const medals = ['🥇','🥈','🥉'];
  document.getElementById('results').innerHTML = ranked.map((card,i) => {
    const rankCls = i<3 ? `rank-${i+1}` : 'rank-other';
    const medal = i<3 ? medals[i] : `#${i+1}`;
    const rateDisp = card.unit==='%' ? `${card.rate}%` : `${card.rate} <small style="font-size:.6em">${card.unit}</small>`;
    const capText = card.cap ? `上限 ${card.cap} ${card.capUnit||''}` : '無上限';
    return `
      <div class="result-card ${rankCls}" style="border-left-color:${card.color}">
        <div class="rank-badge">${medal}</div>
        <div class="card-info">
          <div class="card-name">${card.name}</div>
          <div class="card-issuer">${card.issuer}</div>
          <div class="card-note">${card.note}</div>
          <div class="card-cond">${card.cardNotes}</div>
        </div>
        <div class="rate-block">
          <div class="rate-value">${rateDisp}</div>
          <div class="rate-cap">${capText}</div>
          <a class="rate-link" href="${card.sourceUrl}" target="_blank">官網 ↗</a>
        </div>
      </div>`;
  }).join('');
}

function renderAccordion() {
  document.getElementById('accordion').innerHTML = CARDS.map((card,idx) => {
    const rows = Object.entries(card.rates)
      .filter(([,r]) => r.unit!=='service')
      .map(([,r]) => {
        const rDisp = r.unit==='%' ? `<span class="rate-num">${r.rate}%</span>` : `<span class="rate-num">${r.rate}</span> <small>${r.unit}</small>`;
        const cap = r.cap ? `上限 ${r.cap} ${r.capUnit||''}` : '無上限';
        return `<tr><td>${r.note}</td><td>${rDisp}</td><td>${cap}</td></tr>`;
      }).join('');
    return `
      <div class="acc-item" id="ac${idx}">
        <div class="acc-header" style="border-left-color:${card.color}" onclick="tog(${idx})">
          <div class="acc-dot" style="background:${card.color}"></div>
          <div><div class="acc-title">${card.name}</div><div class="acc-sub">${card.issuer}</div></div>
          <span class="acc-chevron">▼</span>
        </div>
        <div class="acc-body">
          <div class="acc-fee">年費：${card.annualFee}</div>
          <div class="acc-notes">${card.notes}</div>
          <table class="rates-table">
            <thead><tr><th>通路 / 消費類別</th><th>回饋率</th><th>上限</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
          <div class="acc-src">官方資訊：<a href="${card.sourceUrl}" target="_blank">${card.sourceUrl}</a></div>
        </div>
      </div>`;
  }).join('');
}

function tog(idx) { document.getElementById(`ac${idx}`).classList.toggle('open'); }

// 預先渲染 accordion
renderAccordion();
